apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: simple-web-prod
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/claudioaddobbatim2r2/testchatgpt.git
    targetRevision: HEAD
    path: simple-web
    helm:
      valueFiles:
        - values-prod.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: simple-prod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
