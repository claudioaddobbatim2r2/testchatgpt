
replicaCount: 1

image:
  repository: nginx
  tag: latest

service:
  type: ClusterIP
  port: 80

config:
  ENV: dev
  OWNER: dev-team

secret:
  enabled: true  
  API_KEY: dev-secret-key

probes:
  readiness:
    path: /
    initialDelaySeconds: 5
    periodSeconds: 10

  liveness:
    path: /
    initialDelaySeconds: 10
    periodSeconds: 20

html:
  index: |
    <html>
      <body>
        <h1>Simple Web DEV</h1>
        <p>Deploy gestito da Helm e ArgoCD</p>
      </body>
    </html>

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

ingress:
  enabled: false
  host: simple-web.local
  path: /

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

serviceAccount:
  create: true
  name: ""

networkPolicy:
  enabled: true
