apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: simple-web-dev
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/claudioaddobbatim2r2/testchatgpt.git
    targetRevision: HEAD
    path: simple-web
    helm:
      valueFiles:
        - values-dev.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: simple-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
